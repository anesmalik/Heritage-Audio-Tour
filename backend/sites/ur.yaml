  - id: ur_ur_nammu_court
    name: Court of Ur-Nammu
    coordinates: [46.1035, 30.9620]
    keywords: [Ur-Nammu, administrative court, Third Dynasty, Sumerian law]
    description: The administrative complex attached to the ziggurat, associated with the founder of the Third Dynasty of Ur.

  - id: ur_giparu
    name: The Giparu (E-Giparu)
    coordinates: [46.1030, 30.9618]
    keywords: [Giparu, High Priestess, Nanna, religious complex, Enheduanna]
    description: The residence and temple complex of the High Priestess of Nanna, associated with the poet-priestess Enheduanna.

  - id: ur_house_of_abraham
    name: House of Abraham
    coordinates: [46.1025, 30.9610]
    keywords: [Abraham, biblical, Sumerian house, patriarch, Ur of the Chaldees]
    description: A Sumerian-era dwelling traditionally identified as the birthplace of the patriarch Abraham, mentioned in Genesis.

  - id: ur_harbour_district
    name: Harbour District
    coordinates: [46.1040, 30.9630]
    keywords: [harbour, trade, Euphrates, merchant, port, Sumerian commerce]
    description: The ancient port area demonstrating Ur's role as a major commercial hub connecting Mesopotamia with the Persian Gulf trade routes.

  - id: ur_temenos_wall
    name: Temenos Wall
    coordinates: [46.1032, 30.9625]
    keywords: [Temenos, sacred precinct, enclosure wall, ritual boundary]
    description: The massive enclosure wall defining the sacred precinct that contained the ziggurat and main religious complexes of the city.
